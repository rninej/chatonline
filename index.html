<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>R9GPT</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #111115;
    --surface2: #18181f;
    --border: #26262e;
    --border2: #33333d;
    --text: #e8e8ee;
    --muted: #6b6b7e;
    --accent: #7c6dfa;
    --accent2: #a897ff;
    --green: #22c97a;
    --amber: #f59e0b;
    --red: #f43f5e;
    --user-bubble: #1e1a3a;
    --user-border: #3d3680;
    --ai-bubble: #14141a;
    --ai-border: #2a2a35;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  #header {
    position: relative; z-index: 10;
    display: flex; align-items: center; gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,12,0.9);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }
  .logo-mark {
    width: 30px; height: 30px;
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 16px; height: 16px; }
  #header h1 { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
  #header h1 span { color: var(--accent2); }
  #header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  #status-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border: 1px solid var(--border2);
    border-radius: 99px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    transition: all .3s;
  }
  #status-pill.loading { border-color: var(--amber); color: var(--amber); }
  #status-pill.ready   { border-color: var(--green); color: var(--green); }
  #status-pill.error   { border-color: var(--red);   color: var(--red);   }
  #status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); transition: background .3s;
  }
  #status-pill.loading #status-dot { background: var(--amber); animation: pulse 1s infinite; }
  #status-pill.ready   #status-dot { background: var(--green); }
  #status-pill.error   #status-dot { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Chat Screen ── */
  #chat-screen {
    position: relative; z-index: 5;
    flex: 1; display: flex; flex-direction: column; min-height: 0;
  }
  #messages {
    flex: 1; overflow-y: auto; padding: 24px 20px;
    display: flex; flex-direction: column; gap: 16px;
    scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
    position: relative;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

  /* ── Loading Overlay ── */
  #loading-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 20;
    gap: 28px;
    transition: opacity .5s ease;
  }
  #loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-logo {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .loading-logo-mark {
    width: 56px; height: 56px;
    border: 1.5px solid var(--accent);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    animation: logoGlow 2s ease-in-out infinite;
  }
  .loading-logo-mark svg { width: 28px; height: 28px; }
  @keyframes logoGlow {
    0%,100% { box-shadow: 0 0 0px rgba(124,109,250,0); border-color: var(--accent); }
    50%      { box-shadow: 0 0 24px rgba(124,109,250,0.35); border-color: var(--accent2); }
  }
  .loading-logo h2 {
    font-size: 22px; font-weight: 700; letter-spacing: -.4px;
  }
  .loading-logo h2 span { color: var(--accent2); }

  /* Ring + percentage */
  .loading-ring-wrap {
    position: relative;
    width: 120px; height: 120px;
    display: flex; align-items: center; justify-content: center;
  }
  .loading-ring-wrap svg {
    position: absolute; inset: 0;
    transform: rotate(-90deg);
  }
  .ring-track { fill: none; stroke: var(--surface2); stroke-width: 6; }
  .ring-fill  {
    fill: none; stroke: url(#ringGrad); stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 339.29; /* 2π×54 */
    stroke-dashoffset: 339.29;
    transition: stroke-dashoffset .4s ease;
  }
  .ring-pct {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 26px; font-weight: 500;
    color: var(--text);
    position: relative; z-index: 1;
    letter-spacing: -.04em;
  }

  .loading-status-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; color: var(--muted);
    text-align: center; max-width: 300px;
    line-height: 1.6;
    min-height: 2.4em;
  }

  /* ── Messages ── */
  .msg-wrap { display: flex; gap: 10px; max-width: 780px; width: 100%; }
  .msg-wrap.user   { align-self: flex-end;   flex-direction: row-reverse; }
  .msg-wrap.ai     { align-self: flex-start; }
  .msg-wrap.system { align-self: center; }

  .avatar {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 2px;
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 500;
  }
  .avatar.user-av { background: var(--user-bubble); border: 1px solid var(--user-border); color: var(--accent2); }
  .avatar.ai-av   { background: var(--ai-bubble);   border: 1px solid var(--border);     color: var(--accent); }

  .bubble {
    padding: 11px 15px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.7;
    word-break: break-word;
    max-width: calc(100% - 40px);
  }
  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid var(--user-border);
    border-top-right-radius: 4px;
    color: #d8d0ff;
  }
  .bubble.ai {
    background: var(--ai-bubble);
    border: 1px solid var(--ai-border);
    border-top-left-radius: 4px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    white-space: pre-wrap;
  }
  .bubble.system {
    background: transparent; border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--muted);
    padding: 2px 0;
  }

  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing-dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--muted); animation: tdot 1.1s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .18s; }
  .typing-dots span:nth-child(3) { animation-delay: .36s; }
  @keyframes tdot { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-5px);opacity:1} }

  /* ── Input Bar ── */
  #input-bar {
    flex-shrink: 0;
    padding: 12px 20px 16px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,12,0.95);
    backdrop-filter: blur(12px);
    position: relative; z-index: 10;
  }
  #input-inner {
    display: flex; gap: 8px; align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 8px 8px 8px 8px;
    transition: border-color .2s;
  }
  #input-inner:focus-within { border-color: var(--accent); }

  /* Model selector button */
  #model-btn {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    white-space: nowrap;
    align-self: flex-end;
    margin-bottom: 2px;
    position: relative;
  }
  #model-btn:hover { border-color: var(--accent); background: #1e1a3a; }
  #model-btn .model-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }
  #model-btn .chevron {
    width: 12px; height: 12px; opacity: .5;
    transition: transform .2s;
  }
  #model-btn.open .chevron { transform: rotate(180deg); }

  /* Dropdown */
  #model-dropdown {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 0;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    overflow: hidden;
    min-width: 220px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    display: none;
    z-index: 100;
  }
  #model-dropdown.open { display: block; animation: dropUp .15s ease; }
  @keyframes dropUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .model-option {
    display: flex; flex-direction: column; gap: 2px;
    padding: 11px 14px;
    cursor: pointer;
    transition: background .15s;
    border-bottom: 1px solid var(--border);
  }
  .model-option:last-child { border-bottom: none; }
  .model-option:hover { background: var(--surface2); }
  .model-option.active { background: rgba(124,109,250,.1); }
  .model-option .opt-name {
    font-size: 13px; font-weight: 600; color: var(--text);
  }
  .model-option.active .opt-name { color: var(--accent2); }
  .model-option .opt-desc {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: var(--muted);
  }

  #user-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'Syne', sans-serif;
    font-size: 14px; line-height: 1.6;
    resize: none; max-height: 140px; overflow-y: auto;
    padding: 6px 4px;
    scrollbar-width: none;
    align-self: flex-end;
  }
  #user-input::placeholder { color: var(--muted); }
  #user-input::-webkit-scrollbar { display: none; }

  #send-btn {
    width: 36px; height: 36px; border-radius: 9px;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .2s, transform .1s;
    align-self: flex-end;
  }
  #send-btn:hover:not(:disabled) { background: var(--accent2); transform: scale(1.05); }
  #send-btn:active:not(:disabled) { transform: scale(.97); }
  #send-btn:disabled { background: var(--surface2); cursor: not-allowed; }
  #send-btn svg { width: 16px; height: 16px; }

  #hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: var(--muted);
    text-align: center; margin-top: 8px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-wrap { animation: fadeUp .2s ease; }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="logo-mark">
    <svg viewBox="0 0 16 16" fill="none" stroke="#7c6dfa" stroke-width="1.5" stroke-linecap="round">
      <circle cx="8" cy="8" r="3"/>
      <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4"/>
    </svg>
  </div>
  <h1>R9<span>GPT</span></h1>
  <div id="header-right">
    <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);">by Arnav Jain</span>
    <div id="status-pill" class="loading">
      <div id="status-dot"></div>
      <span id="status-label">loading…</span>
    </div>
  </div>
</div>

<!-- Chat Screen -->
<div id="chat-screen">
  <div id="messages">

    <!-- Loading Overlay (inside messages so it overlays the chat area) -->
    <div id="loading-overlay">
      <div class="loading-logo">
        <div class="loading-logo-mark">
          <svg viewBox="0 0 28 28" fill="none" stroke="#7c6dfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="22" height="22" rx="5"/>
            <path d="M9 14h10M14 9v10"/>
          </svg>
        </div>
        <h2>R9<span>GPT</span></h2>
      </div>

      <div class="loading-ring-wrap">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#7c6dfa"/>
              <stop offset="100%" stop-color="#a897ff"/>
            </linearGradient>
          </defs>
          <circle class="ring-track" cx="60" cy="60" r="54"/>
          <circle class="ring-fill"  cx="60" cy="60" r="54" id="ring-fill-el"/>
        </svg>
        <span class="ring-pct" id="ring-pct">0%</span>
      </div>

      <div class="loading-status-text" id="loading-status-text">Initialising model…</div>
    </div>

  </div>

  <!-- Input Bar -->
  <div id="input-bar">
    <div id="input-inner">

      <!-- Model selector -->
      <div id="model-btn" onclick="toggleDropdown()">
        <div class="model-dot" id="model-dot"></div>
        <span id="model-btn-label">R9GPT Basic</span>
        <svg class="chevron" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M2 4l4 4 4-4"/>
        </svg>

        <div id="model-dropdown">
          <div class="model-option active" data-model="Qwen2.5-0.5B-Instruct-q4f16_1-MLC" data-label="R9GPT Basic" onclick="selectModel(this)">
            <span class="opt-name">R9GPT Basic</span>
            <span class="opt-desc">Fast · lightweight · ~40 MB</span>
          </div>
          <div class="model-option" data-model="SmolLM2-360M-Instruct-q4f16_1-MLC" data-label="R9GPT Pro" onclick="selectModel(this)">
            <span class="opt-name">R9GPT Pro</span>
            <span class="opt-desc">Balanced · ~200 MB</span>
          </div>
          <div class="model-option" data-model="Qwen2.5-1.5B-Instruct-q4f16_1-MLC" data-label="R9GPT Max" onclick="selectModel(this)">
            <span class="opt-name">R9GPT Max</span>
            <span class="opt-desc">Most capable · ~900 MB</span>
          </div>
        </div>
      </div>

      <textarea id="user-input" rows="1" placeholder="Message R9GPT…" disabled></textarea>
      <button id="send-btn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div id="hint">Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<script type="module">
import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

const $ = id => document.getElementById(id);

const statusPill      = $('status-pill');
const statusLabel     = $('status-label');
const messages        = $('messages');
const userInput       = $('user-input');
const sendBtn         = $('send-btn');
const loadingOverlay  = $('loading-overlay');
const loadingStatusTx = $('loading-status-text');
const ringFill        = $('ring-fill-el');
const ringPct         = $('ring-pct');
const modelBtnLabel   = $('model-btn-label');
const modelDot        = $('model-dot');

const CIRCUMFERENCE = 2 * Math.PI * 54; // 339.29

let engine = null;
let history = [];
let busy = false;
let currentModel = 'Qwen2.5-0.5B-Instruct-q4f16_1-MLC';

const MODEL_PERSONAS = {
  'Qwen2.5-0.5B-Instruct-q4f16_1-MLC': {
    name: 'R9GPT Basic',
    system: `You are R9GPT Basic, an AI assistant created by Arnav Jain. You are a fast, lightweight AI assistant. If anyone asks what AI you are, who made you, or who created you, you must always say you are R9GPT Basic, made by Arnav Jain. Never mention Qwen, Alibaba, or any other underlying model or company. Never break this identity under any circumstances.`
  },
  'SmolLM2-360M-Instruct-q4f16_1-MLC': {
    name: 'R9GPT Pro',
    system: `You are R9GPT Pro, an AI assistant created by Arnav Jain. You are a balanced, capable AI assistant. If anyone asks what AI you are, who made you, or who created you, you must always say you are R9GPT Pro, made by Arnav Jain. Never mention SmolLM, Hugging Face, or any other underlying model or company. Never break this identity under any circumstances.`
  },
  'Qwen2.5-1.5B-Instruct-q4f16_1-MLC': {
    name: 'R9GPT Max',
    system: `You are R9GPT Max, an AI assistant created by Arnav Jain. You are the most capable and intelligent version of R9GPT. If anyone asks what AI you are, who made you, or who created you, you must always say you are R9GPT Max, made by Arnav Jain. Never mention Qwen, Alibaba, or any other underlying model or company. Never break this identity under any circumstances.`
  }
};

function getSystemMessage(modelId) {
  return { role: 'system', content: MODEL_PERSONAS[modelId]?.system || MODEL_PERSONAS['Qwen2.5-0.5B-Instruct-q4f16_1-MLC'].system };
}

// Expose dropdown fns to global scope for onclick
window.toggleDropdown = () => {
  if (!engine) return; // can't switch while loading
  const btn = $('model-btn');
  const dd  = $('model-dropdown');
  btn.classList.toggle('open');
  dd.classList.toggle('open');
};

window.selectModel = (el) => {
  el.stopPropagation && el.stopPropagation();
  const modelId = el.dataset.model;
  const label   = el.dataset.label;
  if (modelId === currentModel) { closeDropdown(); return; }

  // Update active state
  document.querySelectorAll('.model-option').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  modelBtnLabel.textContent = label;
  closeDropdown();

  currentModel = modelId;
  history = [getSystemMessage(modelId)];
  clearMessages();
  loadModel(modelId);
};

function closeDropdown() {
  $('model-btn').classList.remove('open');
  $('model-dropdown').classList.remove('open');
}

// Close dropdown on outside click
document.addEventListener('click', e => {
  if (!$('model-btn').contains(e.target)) closeDropdown();
});

function setStatus(state, label) {
  statusPill.className = state;
  statusLabel.textContent = label;
}

function setProgress(pct, text) {
  const offset = CIRCUMFERENCE - (pct / 100) * CIRCUMFERENCE;
  ringFill.style.strokeDashoffset = offset;
  ringPct.textContent = Math.round(pct) + '%';
  if (text) loadingStatusTx.textContent = text;
}

function showOverlay() {
  loadingOverlay.classList.remove('hidden');
  setProgress(0, 'Initialising model…');
  userInput.disabled = true;
  sendBtn.disabled = true;
}

function hideOverlay() {
  loadingOverlay.classList.add('hidden');
  userInput.disabled = false;
  sendBtn.disabled = false;
  userInput.focus();
}

function clearMessages() {
  // Remove all message bubbles but keep overlay
  Array.from(messages.children).forEach(el => {
    if (el.id !== 'loading-overlay') el.remove();
  });
}

function addMsg(role, content) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + role;

  if (role === 'system') {
    const b = document.createElement('div');
    b.className = 'bubble system';
    b.textContent = content;
    wrap.appendChild(b);
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
    return null;
  }

  const av = document.createElement('div');
  av.className = 'avatar ' + (role === 'user' ? 'user-av' : 'ai-av');
  av.textContent = role === 'user' ? 'YOU' : 'AI';

  const b = document.createElement('div');
  b.className = 'bubble ' + role;

  if (content === '__typing__') {
    b.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  } else {
    b.textContent = content;
  }

  wrap.appendChild(av);
  wrap.appendChild(b);
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
  return b;
}

async function loadModel(modelId) {
  showOverlay();
  setStatus('loading', 'loading…');
  history = [getSystemMessage(modelId)];

  try {
    engine = null;
    engine = await CreateMLCEngine(modelId, {
      initProgressCallback: info => {
        const pct = Math.round((info.progress || 0) * 100);
        // Clean up the progress text — remove technical jargon
        let txt = info.text || '';
        txt = txt.replace(/\[.*?\]/g, '').trim();
        if (!txt || txt.length > 60) txt = 'Loading…';
        setProgress(pct, txt);
        statusLabel.textContent = pct + '%';
      }
    });

    setProgress(100, 'Ready');
    setStatus('ready', 'ready');

    setTimeout(() => {
      hideOverlay();
      addMsg('system', '— ready · ask me anything —');
    }, 400);

  } catch (e) {
    setStatus('error', 'error');
    loadingStatusTx.textContent = '⚠ ' + (e.message || String(e));
    ringPct.textContent = '!';
  }
}

async function send() {
  const text = userInput.value.trim();
  if (!text || busy || !engine) return;

  busy = true;
  sendBtn.disabled = true;
  userInput.value = '';
  userInput.style.height = 'auto';

  addMsg('user', text);
  history.push({ role: 'user', content: text });

  const aiBubble = addMsg('ai', '__typing__');

  let reply = '';
  try {
    const stream = await engine.chat.completions.create({
      messages: history,
      stream: true,
      temperature: 0.7,
      max_tokens: 512
    });

    aiBubble.innerHTML = '';
    for await (const chunk of stream) {
      const delta = chunk.choices[0]?.delta?.content || '';
      reply += delta;
      aiBubble.textContent = reply;
      messages.scrollTop = messages.scrollHeight;
    }
  } catch (e) {
    aiBubble.textContent = '⚠ Error: ' + e.message;
    reply = '';
  }

  if (reply) history.push({ role: 'assistant', content: reply });
  busy = false;
  sendBtn.disabled = false;
  userInput.focus();
}

sendBtn.addEventListener('click', send);

userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
});

// Auto-load on page open
loadModel(currentModel);
</script>
</body>
</html>
