<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemma Chatbot (LM Studio)</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    #chatbox { width: 90%; max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    #messages { height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; }
    .message { margin: 8px 0; }
    .user { color: #0078D7; }
    .bot { color: #333; }
    #inputArea { display: flex; }
    #userInput { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
    #sendBtn { margin-left: 10px; padding: 10px 20px; background: #0078D7; color: white; border: none; border-radius: 4px; cursor: pointer; }
    #loading { display: none; color: #888; font-style: italic; }
  </style>
</head>
<body>
  <div id="chatbox">
    <h2>Gemma Chatbot</h2>
    <div id="messages"></div>
    <div id="loading">Gemma is thinking...</div>
    <div id="inputArea">
      <input type="text" id="userInput" placeholder="Type your message..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    const apiUrl = "http://127.0.0.1:1234/v1/chat/completions";
    const model = "google/gemma-4-e4b";

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const msg = input.value.trim();
      if (!msg) return;

      appendMessage("You: " + msg, "user");
      input.value = "";
      document.getElementById("loading").style.display = "block";

      const payload = {
        model: model,
        messages: [{ role: "user", content: msg }]
      };

      try {
        const response = await fetch(apiUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        const reply = data.choices?.[0]?.message?.content || "No response.";
        appendMessage("Gemma: " + reply, "bot");
      } catch (error) {
        appendMessage("Error: " + error.message, "bot");
      } finally {
        document.getElementById("loading").style.display = "none";
      }
    }

    function appendMessage(text, role) {
      const messagesDiv = document.getElementById("messages");
      const msgDiv = document.createElement("div");
      msgDiv.className = "message " + role;
      msgDiv.textContent = text;
      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    document.getElementById("sendBtn").addEventListener("click", sendMessage);
    document.getElementById("userInput").addEventListener("keypress", e => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
