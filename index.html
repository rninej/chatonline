<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Local AI Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #111115;
    --surface2: #18181f;
    --border: #26262e;
    --border2: #33333d;
    --text: #e8e8ee;
    --muted: #6b6b7e;
    --accent: #7c6dfa;
    --accent2: #a897ff;
    --green: #22c97a;
    --amber: #f59e0b;
    --red: #f43f5e;
    --user-bubble: #1e1a3a;
    --user-border: #3d3680;
    --ai-bubble: #14141a;
    --ai-border: #2a2a35;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  #header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,12,0.9);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }
  .logo-mark {
    width: 28px; height: 28px;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 14px; height: 14px; }
  #header h1 { font-size: 14px; font-weight: 700; letter-spacing: -.3px; }
  #header h1 span { color: var(--accent2); }
  #header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  #status-pill {
    display: flex; align-items: center; gap: 5px;
    padding: 3px 8px;
    border: 1px solid var(--border2);
    border-radius: 99px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    transition: all .3s;
  }
  #status-pill.loading { border-color: var(--amber); color: var(--amber); }
  #status-pill.ready   { border-color: var(--green); color: var(--green); }
  #status-pill.error   { border-color: var(--red);   color: var(--red);   }
  #status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  #status-pill.loading #status-dot { background: var(--amber); animation: pulse 1s infinite; }
  #status-pill.ready   #status-dot { background: var(--green); }
  #status-pill.error   #status-dot { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Chat Screen ── */
  #chat-screen {
    position: relative; z-index: 5;
    flex: 1; display: flex; flex-direction: column; min-height: 0;
  }
  #messages {
    flex: 1; overflow-y: auto; overflow-x: hidden; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

  .msg-wrap { 
    display: flex; gap: 8px; width: 100%;
    animation: fadeUp .2s ease;
  }
  .msg-wrap.user { justify-content: flex-end; flex-direction: row-reverse; }
  .msg-wrap.ai   { justify-content: flex-start; }
  .msg-wrap.system { justify-content: center; }

  .avatar {
    width: 24px; height: 24px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 2px;
    font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 500;
  }
  .avatar.user-av { background: var(--user-bubble); border: 1px solid var(--user-border); color: var(--accent2); }
  .avatar.ai-av   { background: var(--ai-bubble);   border: 1px solid var(--border);     color: var(--accent); }

  .bubble {
    padding: 10px 12px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.6;
    word-break: break-word;
    max-width: min(85%, 500px);
  }
  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid var(--user-border);
    border-top-right-radius: 4px;
    color: #d8d0ff;
  }
  .bubble.ai {
    background: var(--ai-bubble);
    border: 1px solid var(--ai-border);
    border-top-left-radius: 4px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    white-space: pre-wrap;
    overflow-x: auto;
  }
  .bubble.system {
    background: transparent; border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: var(--muted);
    padding: 0;
  }

  .typing-dots { display: flex; gap: 3px; align-items: center; padding: 2px 0; }
  .typing-dots span {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--muted);
    animation: tdot 1.1s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .18s; }
  .typing-dots span:nth-child(3) { animation-delay: .36s; }
  @keyframes tdot { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-5px);opacity:1} }

  /* ── Input Bar ── */
  #input-bar {
    flex-shrink: 0;
    padding: 8px 12px 12px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: rgba(10,10,12,0.95);
    backdrop-filter: blur(12px);
    position: relative; z-index: 10;
  }
  #input-inner {
    display: flex; gap: 6px; align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 6px 6px 6px 12px;
    transition: border-color .2s;
  }
  #input-inner:focus-within { border-color: var(--accent); }
  #user-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'Syne', sans-serif;
    font-size: 13px; line-height: 1.5;
    resize: none; max-height: 100px; overflow-y: auto;
    padding: 4px 0;
    scrollbar-width: none;
  }
  #user-input::placeholder { color: var(--muted); }
  #user-input::-webkit-scrollbar { display: none; }
  #send-btn {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .2s, transform .1s;
  }
  #send-btn:hover:not(:disabled) { background: var(--accent2); transform: scale(1.05); }
  #send-btn:active:not(:disabled) { transform: scale(.97); }
  #send-btn:disabled { background: var(--surface2); cursor: not-allowed; }
  #send-btn svg { width: 14px; height: 14px; }
  #hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; color: var(--muted);
    text-align: center; margin-top: 6px;
    display: none;
  }

  /* ── Initialization Overlay ── */
  #init-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 12, 0.95);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  #init-overlay.hidden {
    display: none;
  }

  .init-container {
    text-align: center;
    padding: 20px;
  }

  .circular-progress {
    width: 100px;
    height: 100px;
    margin: 0 auto 20px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .circular-progress svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .circular-progress-bg {
    fill: none;
    stroke: var(--border2);
    stroke-width: 3;
  }

  .circular-progress-fill {
    fill: none;
    stroke: url(#grad);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 282.6;
    stroke-dashoffset: 282.6;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .progress-text {
    position: absolute;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
  }

  .init-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 12px;
    letter-spacing: .05em;
    text-transform: uppercase;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Mobile optimizations */
  @media (max-width: 640px) {
    #header {
      padding: 10px 12px;
    }
    .logo-mark {
      width: 26px; height: 26px;
    }
    #header h1 {
      font-size: 13px;
    }
    #messages {
      padding: 12px;
      gap: 10px;
    }
    .bubble {
      font-size: 12px;
      padding: 9px 11px;
      border-radius: 10px;
    }
    .bubble.ai {
      font-size: 11px;
    }
    .avatar {
      width: 22px; height: 22px;
    }
    #input-bar {
      padding: 6px 10px 10px;
    }
    #input-inner {
      padding: 5px 5px 5px 10px;
    }
    #send-btn {
      width: 30px; height: 30px;
    }
    .circular-progress {
      width: 80px;
      height: 80px;
    }
    .progress-text {
      font-size: 16px;
    }
  }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="logo-mark">
    <svg viewBox="0 0 16 16" fill="none" stroke="#7c6dfa" stroke-width="1.5" stroke-linecap="round">
      <circle cx="8" cy="8" r="3"/>
      <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4"/>
    </svg>
  </div>
  <h1>Local<span>AI</span></h1>
  <div id="header-right">
    <div id="status-pill">
      <div id="status-dot"></div>
      <span id="status-label">offline</span>
    </div>
  </div>
</div>

<!-- Initialization Overlay -->
<div id="init-overlay">
  <div class="init-container">
    <div class="circular-progress">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#7c6dfa;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#a897ff;stop-opacity:1" />
          </linearGradient>
        </defs>
        <circle class="circular-progress-bg" cx="60" cy="60" r="45"/>
        <circle class="circular-progress-fill" cx="60" cy="60" r="45"/>
      </svg>
      <span class="progress-text" id="progress-percent">0%</span>
    </div>
    <div class="init-label" id="init-status">Starting AI…</div>
  </div>
</div>

<!-- Chat Screen -->
<div id="chat-screen">
  <div id="messages"></div>
  <div id="input-bar">
    <div id="input-inner">
      <textarea id="user-input" rows="1" placeholder="Message…"></textarea>
      <button id="send-btn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div id="hint">Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<script type="module">
import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

const $ = id => document.getElementById(id);

const statusPill  = $('status-pill');
const statusLabel = $('status-label');
const chatScreen  = $('chat-screen');
const messages    = $('messages');
const userInput   = $('user-input');
const sendBtn     = $('send-btn');
const initOverlay = $('init-overlay');
const progressPercent = $('progress-percent');
const initStatus = $('init-status');

let engine = null;
let history = [];
let busy = false;
let lastProgress = 0;

function setStatus(state, label) {
  statusPill.className = state;
  statusLabel.textContent = label;
}

function addMsg(role, content) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + role;

  if (role === 'system') {
    const b = document.createElement('div');
    b.className = 'bubble system';
    b.textContent = content;
    wrap.appendChild(b);
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
    return null;
  }

  const av = document.createElement('div');
  av.className = 'avatar ' + (role === 'user' ? 'user-av' : 'ai-av');
  av.textContent = role === 'user' ? 'U' : 'AI';

  const b = document.createElement('div');
  b.className = 'bubble ' + role;

  if (content === '__typing__') {
    b.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  } else {
    b.textContent = content;
  }

  wrap.appendChild(av);
  wrap.appendChild(b);
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
  return b;
}

async function initializeModel() {
  const modelId = 'Qwen2.5-0.5B-Instruct-q4f16_1-MLC';
  setStatus('loading', 'loading…');
  lastProgress = 0;

  try {
    engine = await CreateMLCEngine(modelId, {
      initProgressCallback: info => {
        const pct = Math.round((info.progress || 0) * 100);
        
        // Smooth interpolation between progress values
        if (pct > lastProgress) {
          lastProgress = pct;
          progressPercent.textContent = pct + '%';
          initStatus.textContent = info.text || 'Starting AI…';
          
          const circumference = 282.6;
          const offset = circumference - (pct / 100) * circumference;
          const fillCircle = document.querySelector('.circular-progress-fill');
          if (fillCircle) {
            fillCircle.style.strokeDashoffset = offset;
          }
          
          statusLabel.textContent = pct + '%';
        }
      }
    });

    initOverlay.classList.add('hidden');
    setStatus('ready', 'ready');
    sendBtn.disabled = false;

    addMsg('system', '— AI ready · running locally · completely private —');
    userInput.focus();
  } catch (e) {
    setStatus('error', 'error');
    initStatus.textContent = '✗ ' + (e.message || String(e));
  }
}

async function send() {
  const text = userInput.value.trim();
  if (!text || busy || !engine) return;

  busy = true;
  sendBtn.disabled = true;
  userInput.value = '';
  userInput.style.height = 'auto';

  addMsg('user', text);
  history.push({ role: 'user', content: text });

  const aiBubble = addMsg('ai', '__typing__');

  let reply = '';
  try {
    const stream = await engine.chat.completions.create({
      messages: history,
      stream: true,
      temperature: 0.7,
      max_tokens: 512
    });

    aiBubble.innerHTML = '';
    for await (const chunk of stream) {
      const delta = chunk.choices[0]?.delta?.content || '';
      reply += delta;
      aiBubble.textContent = reply;
      messages.scrollTop = messages.scrollHeight;
    }
  } catch (e) {
    aiBubble.textContent = '⚠ Error: ' + e.message;
    reply = '';
  }

  if (reply) history.push({ role: 'assistant', content: reply });
  busy = false;
  sendBtn.disabled = false;
  userInput.focus();
}

sendBtn.addEventListener('click', send);

userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px';
});

// Auto-initialize on page load
window.addEventListener('load', initializeModel);
</script>
</body>
</html>
