<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Groq Chat</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f232c;
    --border: #2a2f3a;
    --text: #e6e8ee;
    --muted: #8b93a7;
    --accent: #f55036;
    --accent-2: #ff7a5c;
    --user-bubble: #2a3142;
    --bot-bubble: #1a1e27;
    --code-bg: #0b0d12;
    --danger: #ff5c5c;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }
  .app {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: 100vh;
  }
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 18px;
    overflow-y: auto;
  }
  .sidebar h1 {
    font-size: 18px;
    margin: 0 0 4px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sidebar h1 .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }
  .subtitle {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 18px;
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .row { display: flex; gap: 8px; }
  .row .field { flex: 1; }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 9px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: background 0.15s, transform 0.05s;
  }
  button:hover { background: var(--accent-2); }
  button:active { transform: scale(0.98); }
  button.ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  button.ghost:hover { color: var(--text); border-color: var(--muted); background: var(--panel-2); }
  .btn-full { width: 100%; }

  .main {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .topbar {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
  }
  .topbar .info {
    font-size: 13px;
    color: var(--muted);
  }
  .topbar .info b { color: var(--text); }

  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .msg .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
  }
  .msg.user .avatar { background: #2a3142; color: #c8d0e0; }
  .msg.assistant .avatar { background: var(--accent); color: white; }
  .msg.system .avatar { background: #3a3f4b; color: #c8d0e0; }
  .bubble {
    background: var(--bot-bubble);
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    flex: 1;
    min-width: 0;
    word-wrap: break-word;
    overflow-wrap: anywhere;
    position: relative;
  }
  .msg.user .bubble { background: var(--user-bubble); }
  .bubble .meta {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .bubble .copy-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 2px 8px;
    font-size: 11px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: normal;
  }
  .bubble .copy-btn:hover { color: var(--text); }
  .bubble pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    padding: 10px 12px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 13px;
    margin: 8px 0;
  }
  .bubble code {
    background: var(--code-bg);
    padding: 2px 5px;
    border-radius: 4px;
    font-size: 13px;
    font-family: "SF Mono", Monaco, Consolas, monospace;
  }
  .bubble pre code { background: transparent; padding: 0; }
  .bubble p { margin: 6px 0; }
  .bubble p:first-child { margin-top: 0; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { padding-left: 22px; margin: 6px 0; }
  .bubble h1, .bubble h2, .bubble h3 { margin: 10px 0 6px; }
  .bubble blockquote {
    border-left: 3px solid var(--accent);
    margin: 8px 0;
    padding: 2px 12px;
    color: var(--muted);
  }
  .bubble a { color: var(--accent-2); }
  .bubble table {
    border-collapse: collapse;
    margin: 8px 0;
    font-size: 13px;
  }
  .bubble th, .bubble td {
    border: 1px solid var(--border);
    padding: 6px 10px;
  }
  .bubble th { background: var(--panel-2); }

  .typing {
    display: inline-block;
    width: 8px;
  }
  .typing::after {
    content: "▋";
    animation: blink 1s steps(2) infinite;
    color: var(--accent);
  }
  @keyframes blink { 50% { opacity: 0; } }

  .composer {
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    background: var(--panel);
  }
  .composer-inner {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .composer textarea {
    flex: 1;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 48px;
    max-height: 200px;
    line-height: 1.4;
  }
  .composer textarea:focus { border-color: var(--accent); }
  .send-btn {
    height: 48px;
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .send-btn:disabled {
    background: var(--panel-2);
    color: var(--muted);
    cursor: not-allowed;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    margin: auto;
    padding: 40px;
  }
  .empty h2 { color: var(--text); margin-bottom: 8px; }
  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }
  .error {
    background: rgba(255, 92, 92, 0.1);
    border: 1px solid var(--danger);
    color: #ffb3b3;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin: 8px 0;
  }
  @media (max-width: 800px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .sidebar.open { display: block; position: absolute; z-index: 10; height: 100%; width: 85%; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <h1><span class="dot"></span> Groq Chat</h1>
    <div class="subtitle">Fast inference · OpenAI-compatible</div>

    <div class="field">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="gsk_..." />
    </div>

    <div class="field">
      <label>Model</label>
      <select id="model">
        <option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile</option>
        <option value="llama-3.1-8b-instant">llama-3.1-8b-instant</option>
        <option value="llama3-70b-8192">llama3-70b-8192</option>
        <option value="llama3-8b-8192">llama3-8b-8192</option>
        <option value="mixtral-8x7b-32768">mixtral-8x7b-32768</option>
        <option value="gemma2-9b-it">gemma2-9b-it</option>
        <option value="deepseek-r1-distill-llama-70b">deepseek-r1-distill-llama-70b</option>
        <option value="qwen-2.5-32b">qwen-2.5-32b</option>
        <option value="qwen-qwq-32b">qwen-qwq-32b</option>
      </select>
    </div>

    <div class="row">
      <div class="field">
        <label>Temperature</label>
        <input type="number" id="temperature" min="0" max="2" step="0.1" value="0.7" />
      </div>
      <div class="field">
        <label>Max Tokens</label>
        <input type="number" id="maxTokens" min="1" max="32000" step="1" value="2048" />
      </div>
    </div>

    <div class="field">
      <label>System Prompt</label>
      <textarea id="systemPrompt" placeholder="You are a helpful assistant."></textarea>
    </div>

    <div class="field">
      <label>
        <input type="checkbox" id="streamToggle" checked /> Stream responses
      </label>
    </div>

    <button class="btn-full ghost" id="clearBtn">🗑 Clear conversation</button>
    <div class="hint">Tip: Press Enter to send, Shift+Enter for newline.</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="info">
        Model: <b id="currentModel">llama-3.3-70b-versatile</b>
        <span id="tokenInfo" style="margin-left:12px;"></span>
      </div>
      <button class="ghost" id="toggleSidebar" style="display:none;">☰</button>
    </div>

    <div class="chat" id="chat">
      <div class="empty" id="emptyState">
        <h2>Start a conversation</h2>
        <p>Type a message below to begin. Your API key is stored only in your browser.</p>
      </div>
    </div>

    <div class="composer">
      <div class="composer-inner">
        <textarea id="input" placeholder="Message Groq..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn">Send ➤</button>
      </div>
    </div>
  </main>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const chatEl = $('chat');
  const inputEl = $('input');
  const sendBtn = $('sendBtn');
  const clearBtn = $('clearBtn');
  const emptyState = $('emptyState');
  const currentModelEl = $('currentModel');
  const tokenInfoEl = $('tokenInfo');
  const modelSel = $('model');

  const apiKeyEl = $('apiKey');
  const tempEl = $('temperature');
  const maxTokEl = $('maxTokens');
  const sysEl = $('systemPrompt');
  const streamEl = $('streamToggle');

  // Load saved settings
  const saved = JSON.parse(localStorage.getItem('groq-chat-settings') || '{}');
  apiKeyEl.value = saved.apiKey || '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';
  modelSel.value = saved.model || 'llama-3.3-70b-versatile';
  tempEl.value = saved.temperature ?? 0.7;
  maxTokEl.value = saved.maxTokens ?? 2048;
  sysEl.value = saved.systemPrompt || 'You are a helpful, concise assistant.';
  streamEl.checked = saved.stream !== false;
  currentModelEl.textContent = modelSel.value;

  const saveSettings = () => {
    localStorage.setItem('groq-chat-settings', JSON.stringify({
      apiKey: apiKeyEl.value,
      model: modelSel.value,
      temperature: tempEl.value,
      maxTokens: maxTokEl.value,
      systemPrompt: sysEl.value,
      stream: streamEl.checked,
    }));
  };
  [apiKeyEl, modelSel, tempEl, maxTokEl, sysEl, streamEl].forEach(el => {
    el.addEventListener('change', saveSettings);
    el.addEventListener('input', saveSettings);
  });
  modelSel.addEventListener('change', () => {
    currentModelEl.textContent = modelSel.value;
  });

  // Conversation history (role/content only)
  let messages = [];

  // Simple markdown renderer (safe-ish)
  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function renderMarkdown(text) {
    // Extract code blocks first
    const codeBlocks = [];
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      codeBlocks.push(`<pre><code class="lang-${escapeHtml(lang)}">${escapeHtml(code.replace(/\n$/, ''))}</code></pre>`);
      return `\u0000CB${codeBlocks.length - 1}\u0000`;
    });

    // Inline code
    text = text.replace(/`([^`\n]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);

    // Escape remaining HTML (but not our placeholders)
    text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // Headers
    text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');

    // Bold / italic
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');

    // Links
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // Blockquotes
    text = text.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

    // Lists (simple)
    text = text.replace(/(^|\n)((?:- .+(?:\n|$))+)/g, (m, pre, block) => {
      const items = block.trim().split('\n').map(l => `<li>${l.replace(/^- /, '')}</li>`).join('');
      return `${pre}<ul>${items}</ul>`;
    });
    text = text.replace(/(^|\n)((?:\d+\. .+(?:\n|$))+)/g, (m, pre, block) => {
      const items = block.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
      return `${pre}<ol>${items}</ol>`;
    });

    // Paragraphs
    text = text.split(/\n{2,}/).map(p => {
      if (/^\s*<(h\d|ul|ol|pre|blockquote)/.test(p.trim())) return p;
      return `<p>${p.replace(/\n/g, '<br>')}</p>`;
    }).join('\n');

    // Restore code blocks
    text = text.replace(/\u0000CB(\d+)\u0000/g, (_, i) => codeBlocks[+i]);
    return text;
  }

  function addMessage(role, content, { streaming = false } = {}) {
    emptyState.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    const avatarLetter = role === 'user' ? 'U' : role === 'assistant' ? 'G' : 'S';
    msg.innerHTML = `
      <div class="avatar">${avatarLetter}</div>
      <div class="bubble">
        <div class="meta">
          <span>${role === 'assistant' ? modelSel.value : role}</span>
          <button class="copy-btn">Copy</button>
        </div>
        <div class="content"></div>
      </div>
    `;
    const contentEl = msg.querySelector('.content');
    if (streaming) {
      contentEl.innerHTML = '<span class="typing"></span>';
    } else {
      contentEl.innerHTML = renderMarkdown(content);
    }
    msg.querySelector('.copy-btn').addEventListener('click', () => {
      navigator.clipboard.writeText(content);
      msg.querySelector('.copy-btn').textContent = 'Copied!';
      setTimeout(() => msg.querySelector('.copy-btn').textContent = 'Copy', 1200);
    });
    chatEl.appendChild(msg);
    chatEl.scrollTop = chatEl.scrollHeight;
    return { el: msg, contentEl };
  }

  function addError(text) {
    emptyState.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'error';
    div.textContent = text;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    const apiKey = apiKeyEl.value.trim();
    if (!apiKey) {
      addError('Please enter your Groq API key in the sidebar.');
      return;
    }

    addMessage('user', text);
    messages.push({ role: 'user', content: text });
    inputEl.value = '';
    autoResize();
    sendBtn.disabled = true;
    sendBtn.textContent = '...';

    const sysPrompt = sysEl.value.trim();
    const apiMessages = [];
    if (sysPrompt) apiMessages.push({ role: 'system', content: sysPrompt });
    apiMessages.push(...messages);

    const { el, contentEl } = addMessage('assistant', '', { streaming: true });
    let fullContent = '';
    let usageInfo = null;

    const body = {
      model: modelSel.value,
      messages: apiMessages,
      temperature: parseFloat(tempEl.value) || 0.7,
      max_tokens: parseInt(maxTokEl.value) || 2048,
      stream: streamEl.checked,
    };

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`,
        },
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        const errText = await res.text();
        let msg = `HTTP ${res.status}`;
        try {
          const j = JSON.parse(errText);
          msg = j.error?.message || msg;
        } catch {}
        throw new Error(msg);
      }

      if (streamEl.checked) {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        contentEl.innerHTML = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || !trimmed.startsWith('data:')) continue;
            const data = trimmed.slice(5).trim();
            if (data === '[DONE]') continue;
            try {
              const json = JSON.parse(data);
              const delta = json.choices?.[0]?.delta?.content || '';
              if (delta) {
                fullContent += delta;
                contentEl.innerHTML = renderMarkdown(fullContent);
                chatEl.scrollTop = chatEl.scrollHeight;
              }
              if (json.x_groq?.usage) usageInfo = json.x_groq.usage;
              if (json.usage) usageInfo = json.usage;
            } catch (e) { /* ignore parse errors on partial chunks */ }
          }
        }
      } else {
        const json = await res.json();
        fullContent = json.choices?.[0]?.message?.content || '';
        usageInfo = json.usage;
        contentEl.innerHTML = renderMarkdown(fullContent);
      }

      messages.push({ role: 'assistant', content: fullContent });
      if (usageInfo) {
        tokenInfoEl.textContent = `Tokens: ${usageInfo.prompt_tokens || 0} in / ${usageInfo.completion_tokens || 0} out`;
      }
    } catch (err) {
      contentEl.remove();
      el.remove();
      addError('Error: ' + err.message);
      // Remove the failed user message from history so user can retry
      messages.pop();
    } finally {
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send ➤';
      inputEl.focus();
    }
  }

  // Auto-resize textarea
  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
  }
  inputEl.addEventListener('input', autoResize);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener('click', sendMessage);

  clearBtn.addEventListener('click', () => {
    if (!confirm('Clear the entire conversation?')) return;
    messages = [];
    chatEl.innerHTML = '';
    chatEl.appendChild(emptyState);
    emptyState.style.display = 'block';
    tokenInfoEl.textContent = '';
  });

  // Mobile sidebar toggle
  if (window.innerWidth <= 800) {
    $('toggleSidebar').style.display = 'inline-block';
  }
  $('toggleSidebar').addEventListener('click', () => {
    $('sidebar').classList.toggle('open');
  });

  inputEl.focus();
})();
</script>
</body>
</html>
