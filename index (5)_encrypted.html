<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected File</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0b;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'JetBrains Mono',monospace;padding:20px}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.01) 2px,rgba(255,255,255,.01) 4px);pointer-events:none;z-index:0}
body>*{position:relative;z-index:1}
.box{width:min(540px,100%);background:#111113;border:1px solid #222226;border-radius:14px;padding:40px 32px;box-shadow:0 0 80px rgba(0,0,0,.6);animation:drop .4s ease-out}
@keyframes drop{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.icon{text-align:center;font-size:44px;margin-bottom:16px}
h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#e8e8e8;text-align:center;margin-bottom:6px;letter-spacing:-.5px}
.sub{text-align:center;font-size:11px;color:#5a5a66;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px}
.pw-wrap{position:relative;margin-bottom:14px}
input{width:100%;background:#0a0a0b;border:1px solid #222226;color:#e8e8e8;font-family:'JetBrains Mono',monospace;font-size:15px;padding:14px 46px 14px 16px;border-radius:8px;outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:3px}
input:focus{border-color:#e8ff47;box-shadow:0 0 0 3px rgba(232,255,71,.07)}
.eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#5a5a66;cursor:pointer;font-size:16px;transition:color .15s}
.eye:hover{color:#e8e8e8}
.btn{width:100%;background:#e8ff47;color:#000;border:none;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:15px;border-radius:8px;cursor:pointer;transition:box-shadow .2s,transform .1s}
.btn:hover{box-shadow:0 0 28px rgba(232,255,71,.25);transform:translateY(-1px)}
.btn:active{transform:scale(.98)}
.err{display:none;margin-top:12px;text-align:center;font-size:11px;color:#ff4757;letter-spacing:1px}
.err.show{display:block}
.prog{display:none;margin-top:16px}
.prog-bar{height:3px;background:#222226;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#47d4ff;border-radius:2px;width:0%;transition:width .3s;box-shadow:0 0 8px rgba(71,212,255,.5)}
.prog-label{font-size:10px;color:#47d4ff;letter-spacing:1px;margin-top:8px;text-align:center}
.hint{margin-top:20px;text-align:center;font-size:9px;color:#333;letter-spacing:1.5px;text-transform:uppercase}
/* Unlocked state */
.unlocked{animation:fadeIn .35s ease-out}
.fname-display{text-align:center;font-size:12px;color:#e8ff47;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.fsize-display{text-align:center;font-size:10px;color:#5a5a66;letter-spacing:1.5px;margin-bottom:16px}
.preview{margin-top:16px;display:flex;justify-content:center;align-items:center;overflow:hidden;border-radius:8px}
.preview img{max-width:100%;max-height:420px;border-radius:8px;object-fit:contain;display:block}
.preview audio{width:100%}
.preview video{max-width:100%;max-height:420px;border-radius:8px}
.preview iframe{width:100%;height:420px;border:1px solid #222226;border-radius:8px;background:#0a0a0b}
.code-preview{width:100%;max-height:340px;overflow:auto;background:#0a0a0b;border:1px solid #222226;border-radius:8px;padding:16px;text-align:left}
.code-preview pre{margin:0;font-size:11px;color:#b0b0b0;white-space:pre-wrap;word-break:break-all;line-height:1.6;font-family:'JetBrains Mono',monospace}
.code-preview .trunc{color:#5a5a66;font-style:italic;font-size:10px}
.dl-btn{display:block;text-align:center;text-decoration:none;background:#2ed573;color:#000;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:14px;border-radius:8px;cursor:pointer;transition:box-shadow .2s,transform .1s;margin-top:18px}
.dl-btn:hover{box-shadow:0 0 28px rgba(46,213,115,.3);transform:translateY(-1px)}
.copy-btn{display:inline-block;background:none;border:1px solid #333;color:#5a5a66;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;padding:6px 14px;border-radius:6px;cursor:pointer;margin-top:10px;transition:color .15s,border-color .15s}
.copy-btn:hover{color:#e8e8e8;border-color:#555}
</style>
</head>
<body>
<div class="box" id="box">
  <div class="icon">🔒</div>
  <h1>Protected File</h1>
  <div class="sub">Enter password 1111 to unlock</div>
  <div class="pw-wrap">
    <input type="password" id="pw" placeholder="Password..." autofocus onkeydown="if(event.key==='Enter')unlock()" />
    <button class="eye" onclick="var i=document.getElementById('pw');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🙈'" aria-label="Toggle visibility">👁</button>
  </div>
  <button class="btn" onclick="unlock()">Unlock →</button>
  <div class="err" id="err">Incorrect password — try again</div>
  <div class="prog" id="prog">
    <div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
    <div class="prog-label" id="pl">Verifying...</div>
  </div>
  <div class="hint">AES-256-GCM · PBKDF2-SHA256</div>
</div>

function b64(s){var b=atob(s),a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmtSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';}
function sp(p,l){document.getElementById('pf').style.width=p+'%';document.getElementById('pl').textContent=l;}
function isText(n){return /\.(txt|md|csv|json|xml|yaml|yml|ini|cfg|conf|log|py|js|mjs|ts|java|c|cpp|h|hpp|cs|rb|go|rs|php|css|scss|less|sql|sh|bash|zsh|bat|ps1|r|swift|kt|scala|pl|lua|el|clj|ex|erl|hs|ml|dockerfile|makefile|gitignore|env|toml|rtf|svg|html|htm|svelte|vue|jsx|tsx)$/i.test(n);}

async function unlock(){
  var pw=document.getElementById('pw').value;
  if(!pw)return;
  document.getElementById('err').classList.remove('show');
  document.getElementById('prog').style.display='block';
  sp(15,'Importing key...');
  await new Promise(function(r){setTimeout(r,20)});
  try{
    var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    sp(35,'Deriving key (PBKDF2)...');await new Promise(function(r){setTimeout(r,20)});
    var k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:200000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    sp(65,'Decrypting...');await new Promise(function(r){setTimeout(r,20)});
    var plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},k,b64(DATA));
    sp(90,'Parsing...');
    var json=new TextDecoder().decode(plain);
    var p=JSON.parse(json);
    var name=p.n,type=p.t,raw=b64(p.d);
    var blob=new Blob([raw],{type:type});
    var url=URL.createObjectURL(blob);
    var sizeStr=fmtSize(raw.byteLength);

    /* HTML files: replace the entire page */
    if(type==='text/html'||/\.html?$/i.test(name)){
      sp(100,'Done!');await new Promise(function(r){setTimeout(r,150)});
      var text=await blob.text();
      document.open();document.write(text);document.close();
      return;
    }

    /* Other files: show preview + download */
    sp(100,'Done!');await new Promise(function(r){setTimeout(r,200)});
    var box=document.getElementById('box');
    var preview='';

    if(type.startsWith('image/')){
      preview='<div class="preview"><img src="'+url+'" alt="'+esc(name)+'" /></div>';
    }else if(type.startsWith('audio/')){
      preview='<div class="preview"><audio src="'+url+'" controls style="width:100%"></audio></div>';
    }else if(type.startsWith('video/')){
      preview='<div class="preview"><video src="'+url+'" controls></video></div>';
    }else if(type==='application/pdf'){
      preview='<div class="preview"><iframe src="'+url+'"></iframe></div>';
    }else if(type.startsWith('text/')||isText(name)){
      var txt=await blob.text();
      var trunc=txt.length>50000;
      var disp=trunc?txt.substring(0,50000):txt;
      preview='<div class="code-preview"><pre>'+esc(disp)+(trunc?'\n<span class="trunc">... truncated ('+fmtSize(raw.byteLength)+') — download for full content</span>':'')+'</pre></div>';
    }

    box.className='box unlocked';
    box.innerHTML='<div class="icon">🔓</div><h1>File Unlocked</h1><div class="fname-display">'+esc(name)+'</div><div class="fsize-display">'+sizeStr+'</div>'+preview+'<a href="'+url+'" download="'+esc(name)+'" class="dl-btn">⬇ Download File</a><div class="hint" style="margin-top:16px">File decrypted with AES-256-GCM</div>';

  }catch(e){
    document.getElementById('prog').style.display='none';
    document.getElementById('err').classList.add('show');
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}
</script>
